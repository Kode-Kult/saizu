version: "2"
type: backend
tech_stack:
  - TypeScript
  - Hono (web framework)
  - Bun (runtime)
  - In-memory cache (custom TTL map)
features:
  - name: API Discovery
    description: Returns API version info and available endpoints
    files:
      - src/api.ts
    endpoints:
      - method: GET
        path: /api/v1
        description: Returns API metadata and list of available endpoints
        auth_required: false
        response_schema:
          "200": "{ version, baseUrl, endpoints[], targetFormats }"

  - name: Health Check
    description: Health check endpoint returning server status and uptime
    files:
      - src/api.ts
    endpoints:
      - method: GET
        path: /api/v1/health
        description: Health check
        auth_required: false
        response_schema:
          "200": "{ status: 'ok', version, uptime }"

  - name: NPM Package Analysis
    description: Analyzes a published npm package returning size, dependencies, module info
    files:
      - src/api.ts
      - src/analyzer.ts
      - src/cache.ts
    endpoints:
      - method: GET
        path: /api/v1/package/:name
        description: Analyze a published npm package (supports scoped packages via wildcard)
        auth_required: false
        response_schema:
          "200": "{ source, packageName, packageVersion, description, license, gzipSize, installSize, fileCount, typeBreakdown, dependencies, hasESM, hasCJS, hasTypes, downloadTime, cachedAt }"
          "400": "{ error: 'MISSING_PARAMS' }"
          "404": "{ error: 'PACKAGE_NOT_FOUND' }"
          "500": "{ error: 'ANALYSIS_FAILED' }"

  - name: GitHub Repo Analysis
    description: Analyzes a public GitHub repository for package size (pre-publish)
    files:
      - src/api.ts
      - src/repoAnalyzer.ts
      - src/cache.ts
    endpoints:
      - method: GET
        path: /api/v1/repo/:owner/:repo
        description: Analyze a public GitHub repo with optional branch and subpath query params
        auth_required: false
        response_schema:
          "200": "{ source: 'github', owner, repo, branch, subpath, commit, ...packageInfo, npmComparison, cachedAt }"
          "400": "{ error: 'MISSING_PARAMS' | 'PRIVATE_REPO' }"
          "404": "{ error: 'REPO_NOT_FOUND' | 'BRANCH_NOT_FOUND' | 'SUBPATH_NOT_FOUND' }"
          "408": "{ error: 'CLONE_TIMEOUT' }"
          "422": "{ error: 'NO_PACKAGE_JSON' | 'MONOREPO_ROOT' | 'INVALID_SUBPATH' }"

  - name: Package Comparison
    description: Compares two targets (npm packages or GitHub repos) side by side
    files:
      - src/api.ts
    endpoints:
      - method: GET
        path: /api/v1/compare
        description: "Compare two targets. Supports npm and github:owner/repo formats via query params a and b"
        auth_required: false
        response_schema:
          "200": "{ a: packageResult, b: packageResult, diff: { gzipSize, installSize, dependencyCount, smaller } }"
          "400": "{ error: 'MISSING_PARAMS' }"

  - name: Internal Package Analysis API
    description: Legacy internal API for analyzing npm packages (used by the UI)
    files:
      - src/routes/api.ts
      - src/analyzer.ts
      - src/cache.ts
    endpoints:
      - method: GET
        path: /api/:package
        description: Analyze a non-scoped npm package
        auth_required: false
        response_schema:
          "200": AnalysisResult
          "500": "{ error: string }"
      - method: GET
        path: /api/:scope/:package
        description: Analyze a scoped npm package (e.g. @tanstack/react-query)
        auth_required: false
        response_schema:
          "200": AnalysisResult
          "500": "{ error: string }"

  - name: Badge Generation
    description: Generates SVG badges showing gzip or install size for npm packages and GitHub repos
    files:
      - src/routes/badge.ts
      - src/badge.ts
    endpoints:
      - method: GET
        path: /badge/:package
        description: Generate SVG size badge for a non-scoped package
        auth_required: false
        response_schema:
          "200": "SVG image (image/svg+xml)"
      - method: GET
        path: /badge/:scope/:package
        description: Generate SVG size badge for a scoped package or GitHub owner/repo
        auth_required: false
        response_schema:
          "200": "SVG image (image/svg+xml)"

  - name: Web UI
    description: Server-rendered landing page with package search, analysis results, and comparison mode
    files:
      - src/routes/ui.ts
    endpoints:
      - method: GET
        path: /
        description: Main landing page with search, analyze, and compare functionality
        auth_required: false
        response_schema:
          "200": HTML page

  - name: Rate Limiting
    description: IP-based rate limiting (60 req/min) with bypass for localhost
    files:
      - src/index.ts
    endpoints: []
    depends_on: []

  - name: Gzip Compression
    description: Server-side gzip compression for text responses (HTML, CSS, JS, JSON)
    files:
      - src/index.ts
    endpoints: []

  - name: Static Assets
    description: Serves fonts, images, and CSS files with cache headers
    files:
      - src/index.ts
    endpoints:
      - method: GET
        path: /fonts/*
        description: Serve WOFF2 font files
        auth_required: false
        response_schema:
          "200": "font/woff2 binary"
      - method: GET
        path: /bg.png
        description: Background image
        auth_required: false
        response_schema:
          "200": "image/png"
      - method: GET
        path: /hero.avif
        description: Hero image
        auth_required: false
        response_schema:
          "200": "image/avif"
      - method: GET
        path: /saizu-logo.avif
        description: Logo image
        auth_required: false
        response_schema:
          "200": "image/avif"
      - method: GET
        path: /css/deferred.css
        description: Deferred CSS stylesheet
        auth_required: false
        response_schema:
          "200": "text/css"
known_limitations:
  - issue: No input validation or sanitization on package names
    location: src/api.ts
    impact: Potentially malicious package names could be passed through
  - issue: In-memory cache with no persistence
    location: src/cache.ts
    impact: Cache is lost on server restart
  - issue: Rate limit state is in-memory only
    location: src/index.ts
    impact: Rate limits reset on restart and don't work across instances
